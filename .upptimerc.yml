# doslarb-status — Upptime config (CEREMONY-01 D-28 — 9 probes)
owner: Doslarb
repo: status
user-agent: doslarb-uptime/1.0

sites:
  - name: Landing
    url: https://doslarb.cloud
  - name: Pricing
    url: https://doslarb.cloud/pricing
  - name: Docs
    url: https://doslarb.cloud/docs
  - name: Playground
    url: https://doslarb.cloud/playground
  - name: API Ping (auth)
    url: https://doslarb.cloud/api/v1/ping
    headers:
      - "Authorization: Bearer $UPPTIME_PROBE_KEY"
  - name: Internal Health
    url: https://doslarb.cloud/api/internal/healthz
  - name: Status Page Self-Check
    url: https://status.doslarb.cloud
  - name: NAS Webhook 401 Contract
    url: https://doslarb.cloud/api/internal/webhooks/nas/transaction
    method: POST
    expectedStatusCodes:
      - 401
    headers:
      - "Content-Type: application/json"
    body: '{}'
  - name: STT Engine Health
    url: https://whisper.doslarb.cloud/health
    expectedStatusCodes:
      - 200

status-website:
  cname: status.doslarb.cloud
  name: Doslarb Status
  logoUrl: https://doslarb.cloud/logos/doslarb.png
  theme: light
  introTitle: "Doslarb Cloud Status"
  introMessage: "Live uptime for doslarb.cloud, our API, the NAS Zero Link payment surface, and the STT engine."
  navbar:
    - title: Home
      href: /
    - title: doslarb.cloud
      href: https://doslarb.cloud

workflowSchedule:
  uptime: "*/5 * * * *"
  responseTime: "0 23 * * *"
  graphs: "0 0 * * *"
  staticSite: "0 1 * * *"
  summary: "0 0 * * *"

assignees:
  - Doslarb
